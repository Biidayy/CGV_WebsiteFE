<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ cá nhân - CGV</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/hosocanhan.css">
</head>
<body>

<div class="profile-container">

    <div class="profile-box">

        <img src="https://www.cgv.vn/skin/frontend/cgv/default/images/cgvlogo.png"
        class="logo">

        <h2>HỒ SƠ CÁ NHÂN</h2>

        <div class="avatar">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Avatar">
        </div>

        <form>

            <label>Họ và tên</label>
            <input type="text" value="Nguyễn Văn A">

            <label>Email</label>
            <input type="email" value="nguyenvana@gmail.com">

            <label>Số điện thoại</label>
            <input type="text" value="0901234567">

            <label>Ngày sinh</label>
            <input type="date">

            <label>Giới tính</label>

            <div class="gender">

                <label>
                    <input type="radio" name="gender">
                    Nam
                </label>

                <label>
                    <input type="radio" name="gender">
                    Nữ
                </label>

            </div>

            <button type="submit">
                CẬP NHẬT THÔNG TIN
            </button>

        </form>

    </div>

</div>

</body>
</html>
