<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - CGV</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dangnhap.css">
</head>
<body>

<div class="login-container">

    <div class="login-box">

        <img src="https://www.cgv.vn/skin/frontend/cgv/default/images/cgvlogo.png"
             class="logo">

        <h2>ĐĂNG NHẬP</h2>

        <form>

            <input
                type="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                placeholder="Mật khẩu"
                required
            >

            <button type="submit">
                ĐĂNG NHẬP
            </button>

            <p class="forgot">
                Quên mật khẩu?
            </p>

            <p class="register">
    Chưa có tài khoản?
    <a href="dangky.html">Đăng ký</a>
</p>
        </form>

    </div>

</div>

</body>
</html>
